# Default config for the "owtt_beacon" stack.
#
# Scenario:
#   * A BEACON (default 'lolo') broadcasts a small telemetry frame over the
#     acoustic link via a Teensy 4.1 (transmitter mode). Default payload is the
#     behaviour-tree tip only; position/speed are optional.
#   * Two SURFACE UNITS (receivers) decode the telemetry, measure a one-way
#     travel-time range to the beacon, and publish a JSON range report (own GPS
#     + range + telemetry) straight to an MQTT broker.
#   * An INFERENCE node (e.g. laptop) subscribes to those reports over MQTT and
#     triangulates the beacon, publishing a NavSatFix for visualisation.
#
# Every value here is a default; all are overridable as launch arguments.

serial:
  port: "/dev/ttyACM0"          # Teensy 4.1 enumerates as ACM
  port_fallback: "/dev/ttyACM1"
  baudrate: 115200

# How the Teensy is configured on startup ($Y command). Per-role overrides come
# from the launch files (beacon -> transmitter, surface unit -> receiver).
teensy:
  mode: "receiver"              # receiver | transmitter | wire
  own_modem_id: "067"           # this node's own modem address
  listen_for_modem_id: "000"    # transmitter-only: "000" = go first
  broadcast_interval_s: 1       # transmitter-only: PPS multiple (1..4)
  command_terminator: "\r\n"

# One-way-travel-time -> range conversion (surface-unit side).
owtt:
  delta_prefix: "#I"
  offset_us: 771600.0           # calibrated (lolo <-> floatsam, Askö 2026)
  min_range_m: 0.0              # drop ranges below this (negatives = bad offset / unsynced clocks)
  max_range_m: 0.0              # drop ranges above this (0 = no upper cap)
  auto_calibrate: true          # learn offset_us per modem pair from the beacon's seeded GPS
  calib_min_samples: 5          # seeded samples to lock the auto offset (needs position_seed_count >= this)
  calib_window: 20              # rolling sample window for the running median
  default_sound_velocity: 1500.0
  sound_velocity_topic: "/lolo/sensors/svs"
  sound_velocity_msg_type: "svs_interfaces/msg/SVS"
  sound_velocity_field: "svs"

# The beacon being tracked / transmitted.
beacon:
  name: "lolo"
  # Acoustic modem id of the beacon. Surface units accept only telemetry frames
  # from this id; leave empty to accept any (single-beacon deployments).
  modem_id: "101"
  # Which telemetry fields the beacon broadcasts. Subset of:
  #   position | depth | svs | speed | bt  (DEFAULT: bt only -- keep payload tiny)
  # NOTE: enable 'depth' if the beacon dives (slant->horizontal range correction)
  # and 'svs' so the surface units use the beacon's in-situ sound velocity instead
  # of a frozen default. SVS source is owtt.sound_velocity_* below.
  telemetry_fields: ["bt"]
  # Telemetry source topics (default derived from beacon.name).
  latlon_topic: ""              # default /<name>/smarc/latlon  (GeoPoint)
  depth_topic: ""               # default /<name>/smarc/depth   (Float32, m +down)
  speed_topic: ""               # default /<name>/smarc/speed   (Float32)
  bt_topic: ""                  # default /<name>/waraps/sensor/bt (String JSON)
  bt_json_field: "tip"          # field pulled out of the bt JSON
  bt_name_only: true            # keep only the action-client name, drop "(Status.RUNNING)"
  bt_basename: true             # keep only the last path segment ("/lolo/move_to" -> "move_to")
  bt_strip_prefix: "A_"         # strip this leading prefix from the bt name ("A_Chilling" -> "Chilling")
  position_precision: 6         # decimal places for lat/lon in the payload
  max_bt_len: 32                # cap bt text length (acoustic bandwidth)
  max_onair_bytes: 64           # Succorfish NM3 packet cap; TEL:<payload> is trimmed to fit
  send_period_s: 1.0            # how often the beacon pushes telemetry to the Teensy
  position_seed_count: 0        # include own GPS in the first N broadcasts then drop it (0 = off)
  # Broadcast START/STOP command channel. The beacon does NOT broadcast until it
  # hears the start keyword over the air, and stops on the stop keyword. Each
  # accepted transition is acked once with an OK broadcast.
  autostart: false              # true = start broadcasting immediately (skip START)
  commander_modem_ids: []       # modem ids allowed to command; empty = accept anyone
  start_keyword: "START"
  stop_keyword: "STOP"
  ack_message: "OK"

# This surface unit (receiver side).
surface_unit:
  name: "surface_unit"          # override per unit (e.g. floatsam_usv_1)
  latlon_topic: ""              # default /<name>/smarc/latlon (own GPS)
  commander: false              # exactly ONE unit = true: only it transmits acoustic START/STOP

# MQTT uplink/downlink. Defaults to the smarc/WARA-PS broker; use localhost:1889
# for a local mosquitto. Topics live under the "tuper" context in an
# "owtt_beacon" subcontext, i.e.  tuper/owtt_beacon/<beacon>/range/<unit>.
mqtt:
  enabled: true
  host: "20.240.40.232"         # smarc / WARA-PS broker
  port: 1884
  keepalive: 30
  username: ""
  password: ""
  topic_prefix: "tuper/owtt_beacon"   # report topic: <prefix>/<beacon>/range/<unit>
  qos: 0

# Inference node (triangulation / multilateration).
inference:
  update_period_s: 1.0
  freshness_window_s: 10.0      # ignore surface-unit reports older than this
  min_units: 2                  # min fresh receivers needed; uses ALL available (scales to N)
  frame_id: "map"
  first_fix_prefer: "north"     # which of the 2 circle solutions before a prior: north|south|east|west
  publish_both: true            # with 2 receivers, also publish the mirror fix on .../estimate_alt
  assumed_depth_m: 0.0          # beacon depth used if telemetry has none (slant->horizontal range)
  motion_model: true            # 2-hypothesis constant-velocity tracker: rejects the mirror over time
  max_speed_mps: 2.0            # XUUV top speed; caps per-update displacement
  use_reported_position: true   # lock the branch with the beacon's own GPS when telemetry carries it
  command_timeout_s: 10.0       # /start /stop service: give up if no beacon OK within this
  command_repeat_s: 1.5         # re-publish the MQTT command this often until acked
